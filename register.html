<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Register Here</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="login-box">
    <h2>Register</h2>

    <form action="php/register.php" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" class="pwd-field" name="password" placeholder="Password" required>
        <label class="show-pwd">
    <input type="checkbox" class="pwd-toggle">
    Show Password
</label>
        <div class="role-box">
            <label>
                <input type="radio" name="category" value="Student" required>
                Student
            </label>
            <label>
                <input type="radio" name="category" value="Teacher" required>
                Teacher
            </label>
        </div>

        <button type="submit">Register</button>
    </form>
</div>
<script>
document.querySelectorAll('.pwd-toggle').forEach(toggle => {
    toggle.addEventListener('change', function () {
        const pwdInput = this.closest('form').querySelector('.pwd-field');
        if (pwdInput) {
            pwdInput.type = this.checked ? 'text' : 'password';
        }
    });
});
</script>
</body>
</html>
